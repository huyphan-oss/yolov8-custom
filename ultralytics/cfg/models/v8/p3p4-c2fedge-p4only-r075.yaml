  - [[-1, 4], 1, Concat, [1]]
  - [-1, 3, C2f, [256]]                # 10 P3 head

  - [-1, 1, Conv, [256, 3, 2]]
  - [[-1, 7], 1, Concat, [1]]
  - [-1, 3, C2fEdge, [512, True, 0.5, 0.75]]    # 13 P4 head

  - [[10, 13], 1, Detect, [nc]]